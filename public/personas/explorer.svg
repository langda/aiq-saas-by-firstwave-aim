<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Explorer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- compass burst: rays of discovery, deliberately uneven — energy before structure -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <line x1="256" y1="256" x2="256" y2="118" stroke-width="14" opacity="0.95"/>
    <line x1="256" y1="256" x2="360" y2="180" stroke-width="10" opacity="0.7"/>
    <line x1="256" y1="256" x2="392" y2="286" stroke-width="12" opacity="0.85"/>
    <line x1="256" y1="256" x2="324" y2="376" stroke-width="8" opacity="0.55"/>
    <line x1="256" y1="256" x2="196" y2="392" stroke-width="11" opacity="0.75"/>
    <line x1="256" y1="256" x2="128" y2="312" stroke-width="9" opacity="0.6"/>
    <line x1="256" y1="256" x2="142" y2="168" stroke-width="13" opacity="0.9"/>
  </g>
  <circle cx="256" cy="256" r="34" fill="#ffffff"/>
  <circle cx="256" cy="256" r="16" fill="#6366f1"/>
  <!-- scattered finds -->
  <circle cx="256" cy="96" r="10" fill="#ffffff" opacity="0.9"/>
  <circle cx="404" cy="292" r="8" fill="#ffffff" opacity="0.8"/>
  <circle cx="128" cy="150" r="7" fill="#ffffff" opacity="0.7"/>
  <circle cx="184" cy="408" r="6" fill="#ffffff" opacity="0.6"/>
</svg>
